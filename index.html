<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Montevideana Corrientes</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
    }

    /* ===== HEADER + ARCOIRIS ===== */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
    }

    .header-main {
      height: 20px;
      background-color: #2c2c2c;
    }

    .header-stripe {
      height: 10px;
    }
    .stripe-1 { background-color: #D92938; }
    .stripe-2 { background-color: #F2A0A7; }
    .stripe-3 { background-color: #11238C; }
    .stripe-4 { background-color: #2B3A8C; }
    .stripe-5 { background-color: #63D8F2; }

    /* ===== HERO / MAIN ===== */
    .hero {
      min-height: calc(100vh - 70px - 160px); /* viewport - header (70px) - footer aprox */
      background-image: url('imagenes/background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* overlay sutil para que el texto sea legible */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #ffffff;
      padding: 2rem 1rem;
    }

    h1.proximamente {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
      text-transform: uppercase;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .hero-logo {
      display: block;
      max-width: 260px;
      width: 70%;
      margin: 0 auto 24px;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.55));
    }

    p.direccion {
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.6;
      opacity: 0.92;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
    }

    /* ===== FOOTER ===== */
    footer {
      background-color: #2c2c2c;
      color: #f0f0f0;
      padding: 28px 40px;
    }

    .footer-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    /* -- Lado izquierdo -- */
    .footer-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .footer-logo {
      height: 52px;
      width: auto;
      object-fit: contain;
      filter: brightness(1.05);
    }

    .footer-brand-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.3;
      max-width: 160px;
    }

    /* -- Lado derecho -- */
    .footer-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      font-size: 0.88rem;
      color: #cccccc;
    }

    .footer-info a {
      color: #cccccc;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-info a:hover {
      color: #63D8F2;
    }

    .footer-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.8;
    }

    /* ===== RESPONSIVE (pequeño ajuste mobile) ===== */
    @media (max-width: 600px) {
      h1.proximamente {
        font-size: 2.2rem;
      }

      .footer-inner {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .footer-info {
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <!-- ======================== HEADER ======================== -->
  <header class="site-header">
    <div class="header-main"></div>
    <div class="header-stripe stripe-1"></div>
    <div class="header-stripe stripe-2"></div>
    <div class="header-stripe stripe-3"></div>
    <div class="header-stripe stripe-4"></div>
    <div class="header-stripe stripe-5"></div>
  </header>

  <!-- ======================== HERO ======================== -->
  <main class="hero">
    <div class="hero-content">
      <h1 class="proximamente">Próximamente...</h1>

      <img
        class="hero-logo"
        src="imagenes/logo.png"
        alt="Logo La Montevideana Corrientes"
      />

      <p class="direccion">
        Necochea 699 (esq. Guastavino) — Corrientes — Argentina
      </p>
    </div>
  </main>

  <!-- ======================== FOOTER ======================== -->
  <footer>
    <div class="footer-inner">

      <!-- Izquierdo: logo + nombre -->
      <div class="footer-brand">
        <img
          class="footer-logo"
          src="imagenes/logo.png"
          alt="Logo La Montevideana"
        />
        <span class="footer-brand-name">La Montevideana<br>Corrientes</span>
      </div>

      <!-- Derecho: dirección + instagram -->
      <div class="footer-info">

        <!-- Dirección -->
        <div class="footer-info-row">
          <!-- Icono ubicación (SVG inline) -->
          <svg class="footer-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <span>Necochea 699, Corrientes</span>
        </div>

        <!-- Instagram -->
        <div class="footer-info-row">
          <!-- Icono Instagram (SVG inline) -->
          <svg class="footer-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
          <a href="https://www.instagram.com/lamontevideana.ctes" target="_blank" rel="noopener">
            @lamontevideana.ctes
          </a>
        </div>

      </div>
    </div>
  </footer>

</body>
</html>
