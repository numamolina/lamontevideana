<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Montevideana Corrientes</title>

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="favicon_files/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_files/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_files/favicon-16x16.png" />
  <link rel="icon" href="favicon_files/favicon.ico" />
  <link rel="manifest" href="favicon_files/site.webmanifest" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Almendra+Display&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background-color: #2c2c2c;
      overflow: hidden; /* sin scroll, todo cabe en pantalla */
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER + ARCOIRIS ===== */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
    }

    .header-main {
      height: 20px;
      background-color: #2c2c2c;
    }

    .header-stripe {
      height: 10px;
    }
    .stripe-1 { background-color: #D92938; }
    .stripe-2 { background-color: #F2A0A7; }
    .stripe-3 { background-color: #11238C; }
    .stripe-4 { background-color: #2B3A8C; }
    .stripe-5 { background-color: #63D8F2; }

    /* ===== HERO / MAIN ===== */
    .hero {
      flex: 1;             /* ocupa todo el espacio restante entre header y footer */
      background-image: url('imagenes/background.jpg');
      background-size: cover;
      background-position: center bottom; /* prioridad parte inferior */
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; /* título arriba, dirección debajo del logo */
      position: relative;
    }

    /* overlay muy sutil: respeta los colores del atardecer */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.12);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #ffffff;
      padding: 3rem 1rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1.proximamente {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
      text-transform: uppercase;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .hero-logo {
      display: block;
      max-width: 260px;
      width: 70%;
      margin: 0 auto;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.45));
    }

    p.direccion {
      margin-top: 4em;      /* ~4 saltos de línea bajo el logo */
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.5;
      opacity: 0.95;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
      color: #ffffff;
      text-align: center;
    }

    p.direccion a {
      color: #ffffff;
      text-decoration: none; /* sin subrayado */
    }

    p.direccion a:hover {
      color: #F2A0A7;
    }

    /* ===== FOOTER ===== */
    footer {
      background-color: #2c2c2c;
      color: #f0f0f0;
      padding: 14px 40px;  /* mitad de alto */
    }

    .footer-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    /* -- Lado izquierdo -- */
    .footer-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .footer-logo {
      height: 36px;   /* logo más compacto acorde al footer reducido */
      width: auto;
      object-fit: contain;
    }

    .footer-brand-name {
      font-family: 'Almendra Display', serif;
      font-size: 0.95rem;
      font-weight: 400;
      color: #ffffff;
      line-height: 1.3;
      max-width: 180px;
    }

    /* -- Lado derecho -- */
    .footer-info {
      display: flex;
      flex-direction: row;          /* ambos en la misma línea */
      align-items: center;
      gap: 24px;
      font-size: 0.88rem;
      color: #cccccc;
    }

    .footer-info a {
      color: #96a3b7;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-info a:hover {
      color: #F2A0A7;
    }

    .footer-info-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-info-row span,
    .footer-info-row a {
      color: #96a3b7;
    }

    .footer-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: #773660;  /* lila: punto medio entre #472c48 y #a84178 */
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      h1.proximamente {
        font-size: 2.2rem;
      }

      .footer-inner {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .footer-info {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <!-- ======================== HEADER ======================== -->
  <header class="site-header">
    <div class="header-main"></div>
    <div class="header-stripe stripe-1"></div>
    <div class="header-stripe stripe-2"></div>
    <div class="header-stripe stripe-3"></div>
    <div class="header-stripe stripe-4"></div>
    <div class="header-stripe stripe-5"></div>
  </header>

  <!-- ======================== HERO ======================== -->
  <main class="hero">
    <!-- Centro: título + logo + dirección -->
    <div class="hero-content">
      <h1 class="proximamente">Próximamente...</h1>
      <img
        class="hero-logo"
        src="imagenes/logo.png"
        alt="Logo La Montevideana Corrientes"
      />
      <p class="direccion">
        <a href="https://maps.app.goo.gl/M6Nd3cZTtaqS82JC7" target="_blank" rel="noopener">
          Necochea 699 (esq. Guastavino) — Corrientes — Argentina
        </a>
      </p>
    </div>
  </main>

  <!-- ======================== FOOTER ======================== -->
  <footer>
    <div class="footer-inner">

      <!-- Izquierdo: logo + nombre -->
      <div class="footer-brand">
        <img
          class="footer-logo"
          src="imagenes/logo.png"
          alt="Logo La Montevideana"
        />
        <span class="footer-brand-name">La Montevideana<br>Corrientes</span>
      </div>

      <!-- Derecho: dirección + instagram -->
      <div class="footer-info">

        <!-- Dirección -->
        <div class="footer-info-row">
          <!-- Icono ubicación (SVG inline) -->
          <svg class="footer-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <a href="https://maps.app.goo.gl/M6Nd3cZTtaqS82JC7" target="_blank" rel="noopener">Necochea 699, Corrientes</a>
        </div>

        <!-- Instagram -->
        <div class="footer-info-row">
          <!-- Icono Instagram (SVG inline) -->
          <svg class="footer-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
          <a href="https://www.instagram.com/lamontevideana.ctes" target="_blank" rel="noopener">
            @lamontevideana.ctes
          </a>
        </div>

      </div>
    </div>
  </footer>

</body>
</html>
